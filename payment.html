<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5e6ca, #d2b48c); /* light brown gradient */
      font-family: 'Segoe UI', sans-serif;
    }

    .main-card {
      border-radius: 20px;
      background: #ffffff;
    }

    h2, h3 {
      color: #5a3e2b; /* dark brown text */
      font-weight: 600;
    }

    .form-label {
      color: #5a3e2b;
      font-weight: 500;
    }

    .btn-success {
      background-color: #6b8e23;
      border: none;
    }

    .btn-success:hover {
      background-color: #556b2f;
    }

    .btn-primary {
      background-color: #8b5e3c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6f4e37;
    }

    .table thead {
      background-color: #6f4e37;
      color: white;
    }

    .table {
      background: white;
    }

    .card-shadow {
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <div class="card main-card card-shadow p-4">

    <h2 class="text-center mb-4">💳 Payment / Billing</h2>

    <div class="row g-3">

      <div class="col-md-4">
        <label class="form-label">Product Name</label>
        <select id="product_name" class="form-select" onchange="setPrice()">
          <option value="">Select Product</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Customer Name</label>
        <input type="text" id="customer_name" class="form-control" placeholder="Enter name">
      </div>

      <div class="col-md-4">
        <label class="form-label">Phone Number</label>
        <input type="text" id="phone" class="form-control" placeholder="Enter phone">
      </div>

    </div>

    <div class="row mt-3 g-3">

      <div class="col-md-3">
        <label class="form-label">Quantity</label>
        <input type="number" id="quantity" class="form-control" onkeyup="calculateTotal()">
      </div>

      <div class="col-md-3">
        <label class="form-label">Price</label>
        <input type="number" id="price" class="form-control" readonly>
      </div>

      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="date" id="payment_date" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Total Price</label>
        <input type="number" id="total_price" class="form-control" readonly>
      </div>

    </div>

    <div class="text-center mt-4">
      <button class="btn btn-success px-4 me-2" onclick="savePayment()">Save</button>
      <button class="btn btn-primary px-4" onclick="generateBill()">Bill</button>
    </div>

  </div>

  <br>

  <h3 class="text-center">📊 Payment Records</h3>

  <div class="card card-shadow p-3">
    <table class="table table-hover text-center">

      <thead>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Total</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="payment_table"></tbody>

    </table>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
