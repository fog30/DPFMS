<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5e6ca, #d2b48c);
      font-family: 'Segoe UI', sans-serif;
    }

    .main-card {
      border-radius: 20px;
      background: #ffffff;
    }

    h2, h4 {
      color: #5a3e2b;
      font-weight: 600;
    }

    .form-label {
      color: #5a3e2b;
      font-weight: 500;
    }

    .btn-success {
      background-color: #6b8e23;
      border: none;
    }

    .btn-success:hover {
      background-color: #556b2f;
    }

    .btn-primary {
      background-color: #8b5e3c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6f4e37;
    }

    .btn-edit {
      background-color: #8b5e3c;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .btn-edit:hover {
      background-color: #6f4e37;
    }

    .table thead {
      background-color: #6f4e37;
      color: white;
    }

    .table {
      background: white;
    }

    .card-shadow {
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- FORM -->
  <div class="card main-card card-shadow p-4">

    <h2 class="text-center mb-4">🛒 Products Management</h2>

    <form>

      <div class="row g-3">

        <div class="col-md-4">
          <label class="form-label">Product Type</label>
          <select id="product_type" class="form-select" onchange="loadProductNames()">
            <option value="">Select Type</option>
            <option value="Crops">Crops</option>
            <option value="Livestock">Livestock</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Product Name</label>
          <select id="product_name" class="form-select">
            <option value="">Select Product</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Price</label>
          <input id="price" type="number" class="form-control" placeholder="Enter price">
        </div>

      </div>

      <div class="text-center mt-4">
        <button type="button" onclick="addProduct()" class="btn btn-success px-4 me-2">Save</button>
        <button type="button" onclick="updateProduct()" class="btn btn-primary px-4">Update</button>
      </div>

    </form>

  </div>

  <br>

  <!-- TABLE -->
  <h4 class="text-center">📊 Products List</h4>

  <div class="card card-shadow p-3">

    <table class="table table-hover text-center">

      <thead>
        <tr>
          <th>Type</th>
          <th>Name</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="productsTable"></tbody>

    </table>

  </div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || []
let editIndex = -1


function loadProductNames(){

let type = document.getElementById("product_type").value
let dropdown = document.getElementById("product_name")

dropdown.innerHTML = "<option value=''>Select Product</option>"

if(type==="Crops"){

let crops = ["Rice","Wheat","Corn","Tomato"]

crops.forEach(function(c){

let option = document.createElement("option")
option.value = c
option.textContent = c

dropdown.appendChild(option)

})

}

if(type==="Livestock"){

let animals = ["Milk","Eggs","Chicken","Goat"]

animals.forEach(function(a){

let option = document.createElement("option")
option.value = a
option.textContent = a

dropdown.appendChild(option)

})

}

}


function addProduct(){

let type = document.getElementById("product_type").value
let name = document.getElementById("product_name").value
let price = document.getElementById("price").value

if(type=="" || name=="" || price==""){
alert("Please fill all fields")
return
}

let product = {
type:type,
name:name,
price:price
}

products.push(product)

localStorage.setItem("products", JSON.stringify(products))

loadProductsTable()

}


function loadProductsTable(){

let table = document.getElementById("productsTable")

table.innerHTML=""

products.forEach(function(p,i){

table.innerHTML +=
"<tr>"+
"<td>"+p.type+"</td>"+
"<td>"+p.name+"</td>"+
"<td>"+p.price+"</td>"+
"<td><button class='btn-edit' onclick='editProduct("+i+")'>Edit</button></td>"+
"</tr>"

})

}


function editProduct(i){

let p = products[i]

document.getElementById("product_type").value = p.type
document.getElementById("product_name").value = p.name
document.getElementById("price").value = p.price

editIndex = i

}


function updateProduct(){

if(editIndex==-1){
alert("Select a product first")
return
}

products[editIndex].type = document.getElementById("product_type").value
products[editIndex].name = document.getElementById("product_name").value
products[editIndex].price = document.getElementById("price").value

localStorage.setItem("products", JSON.stringify(products))

loadProductsTable()

}


window.onload = function(){
loadProductsTable()
}

</script>

</body>
</html>
