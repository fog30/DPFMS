<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #f5e6ca, #d2b48c);
      font-family: 'Segoe UI', sans-serif;
    }

    h2, h4 {
      color: #5a3e2b;
      font-weight: 600;
    }

    .dashboard-card {
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .dashboard-card:hover {
      transform: translateY(-5px);
    }

    .card-title {
      font-size: 16px;
      opacity: 0.9;
    }

    .card-value {
      font-size: 28px;
      font-weight: bold;
    }

    /* Custom colors (farm theme) */
    .card-products { background: #6b8e23; }
    .card-sales { background: #8b5e3c; }
    .card-revenue { background: #d2b48c; color: #333; }
    .card-customers { background: #5a3e2b; }

    .table thead {
      background-color: #6f4e37;
      color: white;
    }

    .table {
      background: white;
    }

    .card-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="container-fluid mt-4">

  <h2 class="text-center mb-4">🌾 Farm Sales Dashboard</h2>

  <!-- CARDS -->
  <div class="row g-4">

    <div class="col-md-3">
      <div class="dashboard-card card-products">
        <div class="card-title">Total Products</div>
        <div id="totalProducts" class="card-value">0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="dashboard-card card-sales">
        <div class="card-title">Total Sales</div>
        <div id="totalSales" class="card-value">0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="dashboard-card card-revenue">
        <div class="card-title">Total Revenue</div>
        <div id="totalRevenue" class="card-value">₹0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="dashboard-card card-customers">
        <div class="card-title">Total Customers</div>
        <div id="totalCustomers" class="card-value">0</div>
      </div>
    </div>

  </div>

  <br>

  <!-- RECENT SALES -->
  <div class="card-box mt-4">

    <h4 class="mb-3">📊 Recent Sales</h4>

    <table class="table table-hover text-center">

      <thead>
        <tr>
          <th>Product</th>
          <th>Customer</th>
          <th>Quantity</th>
          <th>Total</th>
        </tr>
      </thead>

      <tbody id="salesTable"></tbody>

    </table>

  </div>

  <br>

  <!-- CHART -->
  <div class="card-box mt-4">

    <h4 class="mb-3">📈 Sales Chart</h4>

    <canvas id="salesChart" height="100"></canvas>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
