<!DOCTYPE html>
<html>
<head>
  <title>Reports</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5e6ca, #d2b48c);
      font-family: 'Segoe UI', sans-serif;
    }

    h2 {
      color: #5a3e2b;
      font-weight: 600;
    }

    .card {
      border-radius: 20px;
      background: white;
    }

    .stat-card {
      text-align: center;
      padding: 20px;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .stat-title {
      color: #6f4e37;
      font-weight: 500;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #5a3e2b;
    }

    .btn-primary {
      background-color: #8b5e3c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6f4e37;
    }

    .table thead {
      background-color: #6f4e37;
      color: white;
    }

    .table {
      background: white;
    }

    .card-shadow {
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">📊 Sales Reports</h2>

  <!-- STATS -->
  <div class="row mb-4">

    <div class="col-md-6">
      <div class="stat-card">
        <div class="stat-title">Total Sales</div>
        <div id="totalSales" class="stat-value">0</div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="stat-card">
        <div class="stat-title">Total Revenue</div>
        <div id="totalRevenue" class="stat-value">₹0</div>
      </div>
    </div>

  </div>

  <!-- BUTTON -->
  <div class="text-center mb-3">
    <button class="btn btn-primary px-4" onclick="generateReport()">Download Report</button>
  </div>

  <!-- TABLE -->
  <div class="card card-shadow p-3">

    <table class="table table-hover text-center">

      <thead>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Customer</th>
          <th>Quantity</th>
          <th>Total Price</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="reportTable"></tbody>

    </table>

  </div>

</div>

</body>
</html>
