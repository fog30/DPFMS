<!DOCTYPE html>
<html>
<head>
  <title>Crops</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5e6ca, #d2b48c);
      font-family: 'Segoe UI', sans-serif;
    }

    .main-card {
      border-radius: 20px;
      background: #ffffff;
    }

    h2, h4 {
      color: #5a3e2b;
      font-weight: 600;
    }

    .form-label {
      color: #5a3e2b;
      font-weight: 500;
    }

    .btn-success {
      background-color: #6b8e23;
      border: none;
    }

    .btn-success:hover {
      background-color: #556b2f;
    }

    .btn-primary {
      background-color: #8b5e3c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6f4e37;
    }

    .table thead {
      background-color: #6f4e37;
      color: white;
    }

    .table {
      background: white;
    }

    .card-shadow {
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- FORM CARD -->
  <div class="card main-card card-shadow p-4">

    <h2 class="text-center mb-4">🌾 Crops Management</h2>

    <form>

      <div class="row g-3">

        <div class="col-md-4">
          <label class="form-label">Crop Set</label>
          <input id="crop_set" type="text" class="form-control" placeholder="Enter crop set">
        </div>

        <div class="col-md-4">
          <label class="form-label">Crop Name</label>
          <input id="crop_name" type="text" class="form-control" placeholder="Enter crop name">
        </div>

        <div class="col-md-4">
          <label class="form-label">Plantation Date</label>
          <input id="plantation_date" type="date" class="form-control">
        </div>

        <div class="col-md-4">
          <label class="form-label">Harvest Date</label>
          <input id="harvest_date" type="date" class="form-control">
        </div>

        <div class="col-md-4">
          <label class="form-label">Quantity Harvested</label>
          <input id="quantity" type="number" class="form-control" placeholder="Enter quantity">
        </div>

      </div>

      <div class="text-center mt-4">
        <button type="button" onclick="addCrop()" class="btn btn-success px-4 me-2">Save</button>
        <button type="button" onclick="updateCrop()" class="btn btn-primary px-4">Update</button>
      </div>

    </form>

  </div>

  <br>

  <!-- TABLE -->
  <h4 class="text-center">📊 Crop Records</h4>

  <div class="card card-shadow p-3">

    <table class="table table-hover text-center">

      <thead>
        <tr>
          <th>Crop Set</th>
          <th>Crop Name</th>
          <th>Plantation Date</th>
          <th>Harvest Date</th>
          <th>Quantity</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="cropsTable"></tbody>

    </table>

  </div>

</div>

</body>
</html>
